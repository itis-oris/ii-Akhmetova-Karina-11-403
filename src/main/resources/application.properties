spring.application.name=cakeshop

server.port=8081
server.error.whitelabel.enabled=false

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cakeshop}
spring.datasource.username=${DB_USERNAME:${USER}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.freemarker.suffix=.ftlh
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

yandex.maps.api-key=${YANDEX_MAPS_API_KEY:c19a276a-9be7-418a-beaf-9a1a829c2bb4}
# Доп. настройки (БД и т.д.): optional:file:./application-local.properties
spring.config.import=optional:file:./application-local.properties

logging.level.org.springframework.security=INFO
logging.level.org.example=INFO
